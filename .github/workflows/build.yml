name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel (cross-compiled from ARM runner)
          - target: x86_64-apple-darwin
            os: macos-15
            artifact_name: bouncy
            asset_name: bouncy-macos-intel

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-15
            artifact_name: bouncy
            asset_name: bouncy-macos-apple-silicon

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: bouncy.exe
            asset_name: bouncy-windows-x64

          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_name: bouncy.exe
            asset_name: bouncy-windows-arm64

          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: bouncy
            asset_name: bouncy-linux-x64

          # Linux ARM64 (Raspberry Pi 4/5, Asahi, ARM servers)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: bouncy
            asset_name: bouncy-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Core Audio and Metal frameworks are included in macOS SDK

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows SDK includes necessary libraries

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/
          cp README.md LICENSE THIRD-PARTY-NOTICES.md assets/OFL.txt artifacts/
          cd artifacts && zip -r ../${{ matrix.asset_name }}.zip .

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -Destination artifacts/
          Copy-Item README.md, LICENSE, THIRD-PARTY-NOTICES.md, assets/OFL.txt -Destination artifacts/
          Compress-Archive -Path artifacts/* -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
          retention-days: 14

  # Create GitHub Release when a tag is pushed
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lint and format check
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # THIRD-PARTY-NOTICES.md must match the dependency tree: regenerate
  # it and fail if the committed file is stale. This also enforces
  # about.toml's accepted-license allowlist — a new dependency under an
  # unvetted license fails generation instead of shipping silently.
  # cargo-about is pinned to the version that generated the committed
  # file; formatting can differ between versions.
  license-notices:
    name: Check third-party notices
    runs-on: ubuntu-latest
    env:
      CARGO_ABOUT_VERSION: 0.9.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about (prebuilt)
        run: |
          curl -sSfL -o /tmp/cargo-about.tar.gz \
            "https://github.com/EmbarkStudios/cargo-about/releases/download/${CARGO_ABOUT_VERSION}/cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar xzf /tmp/cargo-about.tar.gz -C /tmp
          install "/tmp/cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl/cargo-about" "$HOME/.cargo/bin/"
          cargo about --version

      # --ignore-cr-at-eol: some crates' license texts carry CRLF line
      # endings, which git normalizes in the committed copy.
      - name: Regenerate and compare notices
        run: |
          cargo about generate about.hbs -o /tmp/THIRD-PARTY-NOTICES.md
          if ! git diff --no-index --ignore-cr-at-eol -- THIRD-PARTY-NOTICES.md /tmp/THIRD-PARTY-NOTICES.md; then
            echo "::error::THIRD-PARTY-NOTICES.md is stale. Regenerate with: cargo about generate about.hbs -o THIRD-PARTY-NOTICES.md"
            exit 1
          fi

  # The library must keep compiling for the web demo's target; this
  # tripwire catches native-only code creeping into shared modules.
  wasm-check:
    name: Check wasm32 target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Check library for wasm32
        run: cargo check --target wasm32-unknown-unknown --lib

      - name: Clippy for wasm32
        run: cargo clippy --target wasm32-unknown-unknown --lib -- -D warnings

  # Run the test suite on every supported host platform
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Run tests
        run: cargo test --all-features

  # Report test coverage (informational floor to prevent backsliding)
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --summary-only --fail-under-lines 60

  # Verify DCO sign-off on commits
  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # dcoapp/app is a GitHub App (github.com/apps/dco), not an action,
      # so it cannot be referenced with `uses:`. Check the trailer
      # directly instead: every non-merge commit in the PR must carry a
      # Signed-off-by line matching its author or committer.
      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failed=0
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            author="Signed-off-by: $(git log -1 --format='%an <%ae>' "$sha")"
            committer="Signed-off-by: $(git log -1 --format='%cn <%ce>' "$sha")"
            if ! git log -1 --format='%B' "$sha" | grep -qF -e "$author" -e "$committer"; then
              subject=$(git log -1 --format='%s' "$sha")
              echo "::error::Commit ${sha:0:12} (\"$subject\") is missing a Signed-off-by trailer matching its author or committer. Sign off with: git commit --amend -s"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] && echo "All commits are signed off."
